<!DOCTYPE html>
<html>
<head>
  <title>Rocket Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🚀 Rocket Simulator</h1>

<div id="game">
  <div id="rocket"></div>
</div>

<div id="ui">
  <button onclick="launch()">Launch</button>
  <button onclick="thrust()">🔥 Thrust</button>
  <button onclick="left()">⬅️</button>
  <button onclick="right()">➡️</button>
  <button onclick="deployParachute()">🪂 Parachute</button>

  <p>Fuel: <span id="fuel">100</span></p>
  <p>Altitude: <span id="altitude">0</span></p>
  <p>Status: <span id="status">Ready</span></p>
</div>

<script src="script.js"></script>
</body>
</html>
